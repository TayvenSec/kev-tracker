name: Track KEV Catalog

on:
  schedule:
    # Daily at 09:00 UTC (7:00 PM AEST) — offset from patch-tuesday-tracker
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  track:
    name: Check KEV Catalog
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run KEV tracker
        run: python collect.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: KEV update $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Notify via GitHub Issue
        if: hashFiles('.new_additions') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().split('T')[0];
            const list = fs.readFileSync('.new_additions', 'utf8');
            const count = list.split('\n').filter(Boolean).length;
            const hasRansomware = list.includes('RANSOMWARE');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎯 ${count} new KEV entr${count === 1 ? 'y' : 'ies'}${hasRansomware ? ' — includes ransomware-linked CVE' : ''} (${today})`,
              body: `## New Known Exploited Vulnerabilities\n\nCISA added the following to the KEV catalog — these are **confirmed exploited in the wild** and should be prioritised:\n\n${list}\n\n---\n\n🌐 [Dashboard](https://tayvensec.github.io/kev-tracker/) · 📖 [CISA KEV Catalog](https://www.cisa.gov/known-exploited-vulnerabilities-catalog)\n\n*Auto-generated by kev-tracker on ${today}*`,
              labels: ["kev", "automated"]
            });

      - name: Clean up flag file
        if: always()
        run: rm -f .new_additions
